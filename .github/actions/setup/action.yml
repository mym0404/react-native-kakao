name: Setup
description: Setup development tools and install dependencies

runs:
  using: composite
  steps:
    - name: Setup mise
      uses: jdx/mise-action@v3
      with:
        version: 2026.7.7
        install: true
        cache: true

    - name: Cache dependencies
      id: yarn-cache
      uses: actions/cache@v4
      with:
        path: |
          **/node_modules
          .yarn/install-state.gz
        key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}-${{ hashFiles('**/package.json', '!node_modules/**') }}
        restore-keys: |
          ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          ${{ runner.os }}-yarn-

    - name: Install dependencies
      if: steps.yarn-cache.outputs.cache-hit != 'true'
      run: yarn install --immutable
      shell: bash

    - name: Build
      shell: bash
      run: yarn build

    - name: Generate Android Example Project
      shell: bash
      working-directory: example
      run: yarn expo prebuild -p android --no-install

    - name: Generate iOS Example Project
      shell: bash
      working-directory: example
      run: yarn expo prebuild -p ios --no-install
